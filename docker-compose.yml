version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashionhub-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    ports:
      - '5000:5000'
    networks:
      - fashionhub-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashionhub-web
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - fashionhub-network

  nginx:
    image: nginx:alpine
    container_name: fashionhub-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fashionhub-network

networks:
  fashionhub-network:
    driver: bridge
